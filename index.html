<!DOCTYPE html>
<html>
<head>
<title>POI Collection Tool</title>
<meta charset="utf-8"/>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/gh/geocodezip/geoxml3@master/polys/geoxml3.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

</head>

<body>

<h1>POI Collection Tool</h1>

<input type="file" id="fileInput" multiple accept=".kml,.geojson,.json">

<br><br>

<button onclick="setDisplayMode()">Select Display Location</button>
<button onclick="setBuildingMode()">Select Building Location</button>
<button onclick="savePOI()">Save POI</button>

<button onclick="exportExcel()">Export Excel</button>
<button onclick="exportKML()">Export KML</button>

<button onclick="detectText()">🔍 Detect Signboard</button>

<div class="container">

    <div style="position:relative; width:100%; height:100%;">
        <div id="streetview"></div>
        <canvas id="overlayCanvas"></canvas>
    </div>

    <div id="map"></div>

</div>

<h2>POI Entry</h2>

<div class="poi-form">

<label>Name:</label>
<input id="name">

<label>Category:</label>
<input id="category">

<label>SubCategory:</label>
<input id="subcategory">

<label>Landline:</label>
<input id="landline" type="number">

<label>Mobile:</label>
<input id="mobile" type="number">

<label>Mobile 1:</label>
<input id="mobile1" type="number">

<br><br>

<label>Display Lat:</label>
<input id="displayLat" readonly>

<label>Display Lng:</label>
<input id="displayLng" readonly>

<label>Building Lat:</label>
<input id="buildingLat" readonly>

<label>Building Lng:</label>
<input id="buildingLng" readonly>

<label>Street View Capture Date</label>
<input id="svDate" readonly>

</div>

<button class="save-btn" onclick="savePOI()">💾 SAVE POI</button>

<table border="1" id="poiTable"></table>

<script src="script.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="export.js"></script>

<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&libraries=geometry&callback=initMap"></script>

</body>
</html>
